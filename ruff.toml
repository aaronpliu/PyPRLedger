# Ruff configuration for PRLedger
# See: https://docs.astral.sh/ruff/configuration/

# Target Python version
target-version = "py312"

# Line length for formatting and linting
line-length = 100

# Source directories to lint
src = ["src", "tests"]

# Linter configuration
[lint]
# Select rule sets
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "SIM", # flake8-simplify
    "PTH", # flake8-use-pathlib
]

# Ignore specific rules
ignore = [
    "E501",  # line too long (let the formatter handle this)
    "B904",  # Allow raising exceptions without 'from err' or 'from None'
    "W291",  # trailing whitespace
    "E712",  # comparison to True or False
    "B008",  #
    "N805",  #
    "SIM102", #
    "E402",   # ignore import order
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

# Exclude patterns
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
    "alembic/versions",
]

# Per-file-ignores (optional)
[lint.per-file-ignores]
"__init__.py" = ["F401"]  # Allow unused imports in __init__.py
"tests/*" = ["S101", "PLR2004"]  # Allow assert statements and magic numbers in tests

# Isort configuration
[lint.isort]
known-first-party = ["src"]
lines-after-imports = 2
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

# Format configuration
[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
