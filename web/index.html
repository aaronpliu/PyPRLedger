        /**
         * Check if a string is base64 encoded
         */
        function isBase64(str) {
            if (!str || typeof str !== 'string') return false;
            
            // Base64 regex pattern
            const base64Regex = /^[A-Za-z0-9+/]*={0,2}$/;
            
            // Check if it matches base64 pattern and length is multiple of 4
            return base64Regex.test(str) && str.length % 4 === 0 && str.length > 0;
        }

        /**
         * Decode base64 string to UTF-8
         */
        function decodeBase64(base64Str) {
            try {
                // Handle both browser and Node.js environments
                if (typeof atob !== 'undefined') {
                    // Browser environment
                    const binaryString = atob(base64Str);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    return new TextDecoder('utf-8').decode(bytes);
                } else {
                    // Node.js environment (fallback)
                    return Buffer.from(base64Str, 'base64').toString('utf-8');
                }
            } catch (error) {
                console.error('Failed to decode base64:', error);
                throw error;
            }
        }

        /**
         * Render code diff using diff2html library
         */
        function renderCodeDiff(diff) {
            if (!diff) return '';
            
            try {
                let normalizedDiff = diff;
                
                // Check if diff is base64 encoded
                if (isBase64(diff)) {
                    console.log('Detected base64 encoded diff, decoding...');
                    console.log('Base64 length:', diff.length);
                    try {
                        normalizedDiff = decodeBase64(diff);
                        console.log('Successfully decoded base64 diff');
                        console.log('Decoded diff preview:', normalizedDiff.substring(0, 200));
                    } catch (decodeError) {
                        console.warn('Failed to decode as base64, treating as plain text:', decodeError);
                        // If decoding fails, continue with original diff
                    }
                } else {
                    console.log('Diff is not base64 encoded, using as-is');
                    console.log('Diff preview:', normalizedDiff.substring(0, 200));
                }
                
                // Validate diff content
                if (!normalizedDiff || normalizedDiff.trim().length === 0) {
                    console.warn('Empty diff content after processing');
                    return '<div style="padding: 20px; color: #6c757d; text-align: center;">No diff content available</div>';
                }
                
                // Normalize diff format - ensure proper line breaks
                // Check if diff has any newlines
                const hasNewlines = normalizedDiff.includes('\n') || normalizedDiff.includes('\r');
                
                if (!hasNewlines) {
                    console.log('Normalizing diff format (adding newlines)');
                    // More comprehensive normalization
                    normalizedDiff = normalizedDiff
                        // Add newline before hunk headers (@@ ... @@)
                        .replace(/(@@[^@]*@@)/g, '\n$1')
                        // Add newline before added lines (+ at start, but not +++ )
                        .replace(/(^|\n)(\+[^+])/g, '$1\n$2')
                        // Add newline before removed lines (- at start, but not --- )
                        .replace(/(^|\n)(-[^-])/g, '$1\n$2')
                        // Add newline before context lines (space at start after @@)
                        .replace(/(@@[^@]*@@)( )/g, '$1\n ')
                        .trim();
                    
                    // Ensure "diff --git" is at the very beginning (no leading whitespace/newlines)
                    if (normalizedDiff.startsWith('\n') || normalizedDiff.startsWith('\r')) {
                        normalizedDiff = normalizedDiff.trimStart();
                    }
                    
                    console.log('Normalized diff preview:', normalizedDiff.substring(0, 300));
                }
                
                // Add proper file header if missing
                if (!normalizedDiff.startsWith('diff --git')) {
                    console.log('Adding default file header');
                    normalizedDiff = 'diff --git a/file b/file\n' + normalizedDiff;
                }
                
                console.log('Final diff length:', normalizedDiff.length);
                console.log('Diff starts with:', normalizedDiff.substring(0, 50));
                
                // Configure diff2html
                const configuration = {
                    drawFileList: false,
                    matching: 'lines',
                    outputFormat: currentDiffView, // 'line-by-line' or 'side-by-side'
                    synchronisedScroll: true,
                    highlight: true,
                    stickyFileHeaders: false, // Disable sticky headers to prevent positioning issues
                };
                
                // Create diff2html UI instance and render
                const targetElement = document.createElement('div');
                const diff2htmlUi = new Diff2HtmlUI(targetElement, normalizedDiff, configuration);
                diff2htmlUi.draw();
                
                console.log('Diff rendered successfully');
                return targetElement.innerHTML;
                
            } catch (error) {
                console.error('Error rendering diff:', error);
                console.error('Diff that caused error:', diff.substring(0, 500));
                return `<div style="padding: 20px; color: #ef4444; text-align: center;">Failed to render diff: ${escapeHtml(error.message)}</div>`;
            }
        }

        function renderAIReviewResults(aiSuggestions) {
            if (!aiSuggestions || Object.keys(aiSuggestions).length === 0) return '';
            
            const summary = aiSuggestions.summary || {};
            const reviewedFiles = summary.files_reviewed || 0;
            const criticalIssues = summary.critical_count || 0;
            const totalIssues = summary.total_issues || 0;
            const issues = aiSuggestions.issues || [];
            const positiveFeedback = aiSuggestions.positive_feedback || [];
            const overallAssessment = aiSuggestions.overall_assessment || '';
            
            // Render summary stats
            const statsHtml = `
                <div class="ai-summary-stats">
                    <div class="ai-stat-card">
                        <div class="ai-stat-value ai-stat-files">${reviewedFiles}</div>
                        <div class="ai-stat-label">Files Reviewed</div>
                    </div>
                    <div class="ai-stat-card">
                        <div class="ai-stat-value ai-stat-critical">${criticalIssues}</div>
                        <div class="ai-stat-label">Critical Issues</div>
                    </div>
                    <div class="ai-stat-card">
                        <div class="ai-stat-value ai-stat-total">${totalIssues}</div>
                        <div class="ai-stat-label">Total Issues</div>
                    </div>
                </div>
            `;
            
            // Render issues list
            const issuesHtml = issues.length > 0 ? `
                <div class="ai-issues-list">
                    <h4 style="color: var(--text-primary); margin-bottom: 12px; font-size: 1rem;">🔍 Detailed Issues (${issues.length})</h4>
                    ${issues.map((issue, index) => {
                        const issueTypeClass = `issue-type-${issue.issue_type || 'style'}`;
                        const severity = issue.severity || 'low';
                        const severityClass = `severity-${severity}`;
                        const severityBadgeClass = `severity-${severity}-badge`;
                        const issueNumber = index + 1;
                        
                        return `
                            <div class="ai-issue-item ${severityClass}">
                                <div class="ai-issue-header">
                                    <span class="ai-issue-number">#Issue ${issueNumber}</span>
                                    <span class="ai-issue-file">📄 ${escapeHtml(issue.file || 'Unknown file')}</span>
                                    <span class="ai-issue-line">Line ${issue.line || 'N/A'}</span>
                                </div>
                                <div style="margin-bottom: 8px;">
                                    <span class="ai-issue-type ${issueTypeClass}">${escapeHtml(issue.category || 'general')}</span>
                                    <span class="severity-badge ${severityBadgeClass}">${severity.toUpperCase()}</span>
                                </div>
                                ${issue.description ? `
                                    <div class="ai-issue-section">
                                        <h5 class="ai-section-title">📝 Description</h5>
                                        <div class="ai-section-content ai-issue-description">${escapeHtml(issue.description)}</div>
                                    </div>
                                ` : ''}
                                ${issue.suggestion ? `
                                    <div class="ai-issue-section">
                                        <h5 class="ai-section-title">💡 Suggestion</h5>
                                        <div class="ai-section-content ai-issue-suggestion">${escapeHtml(issue.suggestion)}</div>
                                    </div>
                                ` : ''}
                                ${issue.code_snippet ? `
                                    <div class="ai-issue-section">
                                        <h5 class="ai-section-title">💻 Code Snippet</h5>
                                        <div class="ai-section-content ai-issue-code">${escapeHtml(issue.code_snippet)}</div>
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    }).join('')}
                </div>
            ` : '<p style="color: #6c757d; text-align: center; padding: 20px;">✅ No issues found! Great code!</p>';
            
            // Render positive feedback
            const positiveFeedbackHtml = positiveFeedback.length > 0 ? `
                <div class="ai-issue-section">
                    <h5 class="ai-section-title">✅ Positive Feedback</h5>
                    <div class="ai-section-content ai-positive-feedback">
                        <ul style="margin: 0; padding-left: 20px;">
                            ${positiveFeedback.map(feedback => `<li style="margin: 4px 0; line-height: 1.6; font-size: 0.9rem;">${escapeHtml(feedback)}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            ` : '';
            
            // Render overall assessment at the bottom
            const assessmentHtml = overallAssessment ? `
                <div class="ai-issue-section">
                    <h5 class="ai-section-title">📊 Overall Assessment</h5>
                    <div class="ai-section-content ai-overall-assessment">
                        <p style="margin: 0; line-height: 1.6;">${escapeHtml(overallAssessment)}</p>
                    </div>
                </div>
            ` : '';
            
            return `
                <div class="ai-review-summary">
                    <div style="background: #fef3c7; border-left: 4px solid #f59e0b; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 0.85rem; color: #92400e;" data-theme-disclaimer>
                        <strong>⚠️ Disclaimer:</strong> This review result was generated by AI and may not be fully accurate. Please verify all important information independently.
                    </div>
                    ${statsHtml}
                    ${issuesHtml}
                    ${positiveFeedbackHtml}
                    ${assessmentHtml}
                </div>
            `;
        }

        function updateScoreDisplay(reviewId) {
            const scoreInput = document.getElementById(`score_${reviewId}`);
            const scoreSlider = document.getElementById(`scoreSlider_${reviewId}`);
            const scoreDisplay = document.getElementById(`scoreDisplay_${reviewId}`);
            
            const value = parseFloat(scoreInput.value) || 0;
            scoreSlider.value = value;
            scoreDisplay.textContent = value.toFixed(1);
        }

        function syncScoreInput(reviewId) {
            const scoreSlider = document.getElementById(`scoreSlider_${reviewId}`);
            const scoreInput = document.getElementById(`score_${reviewId}`);
            const scoreDisplay = document.getElementById(`scoreDisplay_${reviewId}`);
            
            const value = parseFloat(scoreSlider.value);
            scoreInput.value = value.toFixed(1);
            scoreDisplay.textContent = value.toFixed(1);
        }

        function selectQuickScore(reviewId, suggestionKey, score, btnElement) {
            // Remove selected class from all quick score buttons in this suggestion
            const suggestionItem = btnElement.closest('.ai-suggestion-item');
            const allButtons = suggestionItem.querySelectorAll('.quick-score-btn');
            allButtons.forEach(btn => btn.classList.remove('selected'));
            
            // Add selected class to clicked button
            btnElement.classList.add('selected');
            
            // Show scoring form with pre-filled score
            showScoringFormForSuggestion(reviewId, suggestionKey, score);
        }

        function showScoringFormForSuggestion(reviewId, suggestionKey, prefillScore = null) {
            const form = document.getElementById(`scoringForm_${reviewId}`);
            form.style.display = 'block';
            form.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            if (prefillScore !== null) {
                const scoreInput = document.getElementById(`score_${reviewId}`);
                const scoreSlider = document.getElementById(`scoreSlider_${reviewId}`);
                const scoreDisplay = document.getElementById(`scoreDisplay_${reviewId}`);
                
                scoreInput.value = prefillScore.toFixed(1);
                scoreSlider.value = prefillScore;
                scoreDisplay.textContent = prefillScore.toFixed(1);
            }
            
            // Store the suggestion key for reference when submitting
            form.dataset.suggestionKey = suggestionKey;
        }

        function showScoringForm(reviewId) {
            const form = document.getElementById(`scoringForm_${reviewId}`);
            form.style.display = 'block';
            form.scrollIntoView({ behavior: 'smooth', block: 'center' });
            form.dataset.suggestionKey = null; // Clear any previous suggestion key
            
            // Debug: Check if reviewer field is populated
            setTimeout(() => {
                const reviewerInput = document.getElementById(`reviewer_${reviewId}`);
                console.log(`Reviewer input value for review ${reviewId}:`, reviewerInput?.value);
                if (!reviewerInput?.value) {
                    console.warn('⚠️ Reviewer field is empty! Current reviewer:', currentReviewer);
                }
            }, 100);
        }

        function hideScoringForm(reviewId) {
            const form = document.getElementById(`scoringForm_${reviewId}`);
            form.style.display = 'none';
        }

        async function submitScore(reviewId) {
            const scoreInput = document.getElementById(`score_${reviewId}`);
            const commentInput = document.getElementById(`comment_${reviewId}`);
            const reviewerInput = document.getElementById(`reviewer_${reviewId}`);
            const successMsg = document.getElementById('successMessage');
            const errorEl = document.getElementById('error');
            const form = document.getElementById(`scoringForm_${reviewId}`);

            const score = parseFloat(scoreInput.value);
            const comment = commentInput.value.trim();
            const reviewer = reviewerInput.value.trim();
            const suggestionKey = form.dataset.suggestionKey;

            console.log('Submitting score:', { reviewId, reviewer, score, comment });

            // Validate reviewer
            if (!reviewer) {
                showError('⚠️ Reviewer is required. Please set your username in the top filter section.');
                return;
            }

            if (isNaN(score) || score < 0 || score > 10) {
                showError('Please enter a valid score between 0 and 10');
                return;
            }

            try {
                const reviewData = findReviewById(reviewId);
                console.log('Review data:', reviewData);
                
                if (!reviewData) {
                    throw new Error('Review data not found');
                }

                // Determine scoring level
                const scoringLevel = reviewData.source_filename ? 'FILE-LEVEL' : 'PR-LEVEL';
                console.log(`📊 Submitting ${scoringLevel} score:`, {
                    review_id: reviewId,
                    source_filename: reviewData.source_filename || null,
                    reviewer,
                    score
                });

                const requestBody = {
                    pull_request_id: reviewData.pull_request_id,
                    pull_request_commit_id: reviewData.pull_request_commit_id || 'unknown',
                    project_key: reviewData.project_key,
                    repository_slug: reviewData.repository_slug,
                    reviewer: reviewer,
                    score: score,
                    score_description: getScoreDescription(score),
                    reviewer_comments: comment,
                    // Explicitly set source_filename to null for PR-level scoring
                    source_filename: reviewData.source_filename || null
                };

                console.log('Request body:', requestBody);

                // Show confirmation dialog before submitting
                const confirmMessage = `📋 Confirm Your Score\n\n` +
                    `Reviewer: ${reviewer}\n` +
                    `Level: ${scoringLevel}${reviewData.source_filename ? '\nFile: ' + reviewData.source_filename : ''}\n` +
                    `Score: ${score.toFixed(1)} (${getScoreDescription(score)})\n` +
                    `${comment ? '\nComment:\n' + comment : ''}\n\n` +
                    `Do you want to submit this score?`;

                const confirmed = confirm(confirmMessage);
                
                if (!confirmed) {
                    // User cancelled - hide error message if any
                    errorEl.style.display = 'none';
                    return;
                }

                const response = await fetch(`${API_BASE_URL}/reviews/score`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                console.log('Response status:', response.status);

                if (!response.ok) {
                    const errorData = await response.json();
                    console.error('Error response:', errorData);
                    throw new Error(errorData.message || 'Failed to submit score');
                }

                const result = await response.json();
                console.log('Success result:', result);
                
                showSuccess(`✅ Score submitted successfully! Score: ${result.score}`);

                scoreInput.value = '';
                commentInput.value = '';
                hideScoringForm(reviewId);

                // Reload reviews to show updated scores
                setTimeout(() => {
                    loadAllReviews();
                }, 1500);

            } catch (error) {
                console.error('Submit score error:', error);
                showError(`Error: ${error.message}`);
            }
        }

        function findReviewById(reviewId) {
            return allReviews.find(r => r.id === reviewId);
        }

        function getScoreClass(score) {
            if (score >= 9) return 'score-excellent';
            if (score >= 7) return 'score-good';
            if (score >= 5) return 'score-average';
            return 'score-poor';
        }

        function getScoreDescription(score) {
            if (score >= 9) return 'Excellent';
            if (score >= 7) return 'Good';
            if (score >= 5) return 'Average';
            if (score >= 3) return 'Below Average';
            return 'Poor';
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Delete Score Function
        async function deleteScore(pullRequestId, projectKey, repositorySlug, reviewer, sourceFilename) {
            // Confirm deletion
            const confirmed = confirm(
                `⚠️ Confirm Deletion\n\n` +
                `Are you sure you want to delete your score?\n\n` +
                `Reviewer: ${reviewer}\n` +
                `PR: ${pullRequestId}\n` +
                `File: ${sourceFilename || 'PR-level'}\n\n` +
                `This action will mark the score as inactive (soft delete).`
            );
            
            if (!confirmed) {
                return;
            }
            
            try {
                // Build query parameters
                const params = new URLSearchParams({
                    pull_request_id: pullRequestId,
                    project_key: projectKey,
                    repository_slug: repositorySlug,
                    reviewer: reviewer,
                });
                
                if (sourceFilename) {
                    params.append('source_filename', sourceFilename);
                }
                
                const response = await fetch(
                    `${API_BASE_URL}/reviews/score/${reviewer}?${params}`,
                    {
                        method: 'DELETE',
                    }
                );
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail?.message || 'Failed to delete score');
                }
                
                showSuccess('✅ Score deleted successfully');
                
                // Reload reviews to reflect changes
                setTimeout(() => {
                    loadAllReviews();
                }, 1000);
                
            } catch (error) {
                console.error('Delete score error:', error);
                showError(`Error: ${error.message}`);
            }
        }

        // Back to Top functionality
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // Show/hide back to top button based on scroll position
        function handleScroll() {
            const backToTopBtn = document.getElementById('backToTop');
            if (window.pageYOffset > 300) {
                backToTopBtn.classList.add('visible');
            } else {
                backToTopBtn.classList.remove('visible');
            }
        }

        // Add scroll event listener
        window.addEventListener('scroll', handleScroll);

        // Load reviews on page load
        window.addEventListener('DOMContentLoaded', loadAllReviews);
    </script>
