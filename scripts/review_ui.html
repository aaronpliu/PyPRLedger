<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pull Request Review System - Enhanced</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .filters {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-weight: 600;
            color: #495057;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .filter-group input,
        .filter-group select {
            padding: 10px 15px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
        }

        .content {
            padding: 30px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #667eea;
            font-size: 1.2rem;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #c33;
            margin: 20px 0;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #3c3;
            margin: 20px 0;
            display: none;
        }

        /* Grouped Reviews */
        .pr-group {
            margin-bottom: 30px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            overflow: hidden;
        }

        .pr-group-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .pr-group-header:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6a4190 100%);
        }

        .pr-group-info {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .pr-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .pr-toggle {
            font-size: 1.5rem;
            transition: transform 0.3s;
        }

        .pr-group.expanded .pr-toggle {
            transform: rotate(180deg);
        }

        .pr-group-body {
            display: none;
            padding: 20px;
            background: #f8f9fa;
        }

        .pr-group.expanded .pr-group-body {
            display: block;
        }

        /* Review Cards */
        .review-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .review-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .review-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-reviewer {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge-file {
            background: #fff3e0;
            color: #f57c00;
        }

        .badge-pr-level {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .badge-status {
            background: #e8f5e9;
            color: #388e3c;
        }

        .review-author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .author-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .review-body {
            margin-bottom: 15px;
        }

        .review-title {
            font-weight: 700;
            color: #212529;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .review-text {
            color: #495057;
            line-height: 1.6;
        }

        /* Scores Section */
        .scores-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
        }

        .scores-section h4 {
            color: #212529;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: white;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 3px solid #667eea;
        }

        .score-value {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
            flex-shrink: 0;
        }

        .score-excellent { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .score-good { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .score-average { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .score-poor { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }

        .score-details {
            flex-grow: 1;
        }

        .score-reviewer {
            font-weight: 600;
            color: #212529;
            margin-bottom: 3px;
        }

        .score-description {
            font-size: 0.9rem;
            color: #6c757d;
        }

        .score-type {
            font-size: 0.8rem;
            color: #999;
            font-style: italic;
        }

        /* Scoring Form */
        .scoring-form-container {
            background: white;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            border: 2px dashed #667eea;
        }

        .scoring-form {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 12px;
            align-items: center;
        }

        .scoring-form label {
            font-weight: 600;
            color: #495057;
            font-size: 0.9rem;
        }

        .scoring-form input[type="number"] {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 1rem;
        }

        .scoring-form textarea {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 60px;
            grid-column: 2;
        }

        .form-actions {
            grid-column: 2;
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        /* AI Suggestions */
        .ai-suggestions {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            border-left: 4px solid #2196f3;
        }

        .ai-suggestions h4 {
            color: #1976d2;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .ai-suggestion-item {
            background: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .ai-suggestion-text {
            color: #495057;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .filters {
                grid-template-columns: 1fr;
            }

            .pr-group-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Pull Request Review System - Enhanced</h1>
            <p>View and score all reviews with AI suggestions</p>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label for="projectKey">Project Key:</label>
                <input type="text" id="projectKey" placeholder="Leave empty for all projects">
            </div>
            <div class="filter-group">
                <label for="repositorySlug">Repository:</label>
                <input type="text" id="repositorySlug" placeholder="Leave empty for all repositories">
            </div>
            <div class="filter-group">
                <label for="pullRequestId">Pull Request ID:</label>
                <input type="text" id="pullRequestId" placeholder="Leave empty for all PRs">
            </div>
            <div class="filter-group" style="justify-content: flex-end;">
                <button class="btn btn-primary" onclick="loadAllReviews()">Load All Reviews</button>
            </div>
        </div>

        <div class="content">
            <div id="successMessage" class="success-message"></div>
            <div id="loading" class="loading">Loading all reviews...</div>
            <div id="error" class="error" style="display: none;"></div>
            <div id="reviewsContainer"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api/v1';

        // Helper function to format dates
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        async function loadAllReviews() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const container = document.getElementById('reviewsContainer');
            const successMsg = document.getElementById('successMessage');

            successMsg.style.display = 'none';
            errorEl.style.display = 'none';
            loadingEl.style.display = 'block';
            container.innerHTML = '';

            try {
                const projectKey = document.getElementById('projectKey').value;
                const repositorySlug = document.getElementById('repositorySlug').value;
                const pullRequestId = document.getElementById('pullRequestId').value;

                // Build query parameters
                const params = new URLSearchParams();
                if (projectKey) params.append('project_key', projectKey);
                if (repositorySlug) params.append('repository_slug', repositorySlug);
                if (pullRequestId) params.append('pull_request_id', pullRequestId);

                const response = await fetch(`${API_BASE_URL}/reviews?${params}`);
                
                if (!response.ok) {
                    throw new Error(`Failed to load reviews: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                displayGroupedReviews(data.items || []);

            } catch (error) {
                errorEl.textContent = `Error: ${error.message}`;
                errorEl.style.display = 'block';
            } finally {
                loadingEl.style.display = 'none';
            }
        }

        function displayGroupedReviews(reviews) {
            const container = document.getElementById('reviewsContainer');

            if (reviews.length === 0) {
                container.innerHTML = '<div class="loading">No reviews found</div>';
                return;
            }

            // Group reviews by project/repository/pull_request_id
            const grouped = {};
            reviews.forEach(review => {
                const key = `${review.project_key}|${review.repository_slug}|${review.pull_request_id}`;
                if (!grouped[key]) {
                    grouped[key] = {
                        project_key: review.project_key,
                        repository_slug: review.repository_slug,
                        pull_request_id: review.pull_request_id,
                        reviews: []
                    };
                }
                grouped[key].reviews.push(review);
            });

            // Generate HTML for each group
            const html = Object.values(grouped).map(group => `
                <div class="pr-group">
                    <div class="pr-group-header" onclick="toggleGroup(this)">
                        <div class="pr-group-info">
                            <span class="pr-badge">📋 ${escapeHtml(group.project_key)}</span>
                            <span class="pr-badge">📁 ${escapeHtml(group.repository_slug)}</span>
                            <span class="pr-badge">🔖 ${escapeHtml(group.pull_request_id)}</span>
                            <span class="pr-badge">👥 ${group.reviews.length} review(s)</span>
                        </div>
                        <span class="pr-toggle">▼</span>
                    </div>
                    <div class="pr-group-body">
                        ${group.reviews.map(review => createReviewCard(review)).join('')}
                    </div>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        function createReviewCard(review) {
            const scores = review.score_summary?.scores || [];
            const hasAiSuggestions = review.ai_suggestions && Object.keys(review.ai_suggestions).length > 0;

            return `
                <div class="review-card">
                    <div class="review-header">
                        <div class="review-meta">
                            <span class="badge badge-reviewer">👤 ${escapeHtml(review.reviewer_info?.display_name || review.reviewer)}</span>
                            ${review.source_filename ? 
                                `<span class="badge badge-file">📄 ${escapeHtml(review.source_filename)}</span>` : 
                                '<span class="badge badge-pr-level">📋 PR-Level</span>'}
                            <span class="badge badge-status">✅ ${escapeHtml(review.pull_request_status)}</span>
                        </div>
                        <div class="review-author">
                            <div class="author-avatar">${getInitials(review.reviewer_info?.display_name || review.reviewer)}</div>
                        </div>
                    </div>
                    
                    <div class="review-body">
                        <div class="review-title">Review by ${escapeHtml(review.reviewer_info?.display_name || review.reviewer)}</div>
                        ${review.reviewer_comments ? `<div class="review-text">${escapeHtml(review.reviewer_comments)}</div>` : ''}
                    </div>

                    ${scores.length > 0 ? `
                        <div class="scores-section">
                            <h4>📊 Scores (${scores.length})</h4>
                            ${scores.map(score => `
                                <div class="score-item">
                                    <div class="score-value ${getScoreClass(score.score)}">${score.score}</div>
                                    <div class="score-details">
                                        <div class="score-reviewer">${escapeHtml(score.reviewer_info?.display_name || score.reviewer)}</div>
                                        <div class="score-description">${escapeHtml(score.score_description || 'No description')}</div>
                                        <div class="score-type">${score.source_filename ? '📄 File: ' + escapeHtml(score.source_filename) : '📋 PR-Level'}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}

                    ${hasAiSuggestions ? `
                        <div class="ai-suggestions">
                            <h4>🤖 AI Suggestions</h4>
                            ${Object.entries(review.ai_suggestions).map(([key, suggestion], index) => `
                                <div class="ai-suggestion-item">
                                    <div class="ai-suggestion-text">${escapeHtml(suggestion)}</div>
                                    <button class="btn btn-success btn-small" onclick="showAiScoringForm(${review.id}, '${escapeHtml(key)}', ${index})">
                                        Score This Suggestion
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}

                    <div class="scoring-form-container" id="scoringForm_${review.id}" style="display: none;">
                        <div class="scoring-form">
                            <label for="score_${review.id}">Score (0-10):</label>
                            <input type="number" id="score_${review.id}" min="0" max="10" step="0.5" placeholder="Enter score">
                            
                            <label for="comment_${review.id}">Comment:</label>
                            <textarea id="comment_${review.id}" placeholder="Review comment (optional)" rows="3"></textarea>
                            
                            <div class="form-actions">
                                <button class="btn btn-success" onclick="submitScore(${review.id})">Submit Score</button>
                                <button class="btn btn-secondary" onclick="hideScoringForm(${review.id})">Cancel</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleGroup(header) {
            const group = header.parentElement;
            group.classList.toggle('expanded');
        }

        function showScoringForm(reviewId) {
            const form = document.getElementById(`scoringForm_${reviewId}`);
            form.style.display = 'block';
            form.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function hideScoringForm(reviewId) {
            const form = document.getElementById(`scoringForm_${reviewId}`);
            form.style.display = 'none';
        }

        async function submitScore(reviewId) {
            const scoreInput = document.getElementById(`score_${reviewId}`);
            const commentInput = document.getElementById(`comment_${reviewId}`);
            const successMsg = document.getElementById('successMessage');
            const errorEl = document.getElementById('error');

            const score = parseFloat(scoreInput.value);
            const comment = commentInput.value.trim();

            if (isNaN(score) || score < 0 || score > 10) {
                errorEl.textContent = 'Please enter a valid score between 0 and 10';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const reviewData = findReviewById(reviewId);
                if (!reviewData) {
                    throw new Error('Review data not found');
                }

                const reviewer = reviewData.reviewer || reviewData.reviewer_info?.username;
                if (!reviewer) {
                    throw new Error('Reviewer information not found');
                }

                const requestBody = {
                    pull_request_id: reviewData.pull_request_id,
                    pull_request_commit_id: reviewData.pull_request_commit_id,
                    project_key: reviewData.project_key,
                    repository_slug: reviewData.repository_slug,
                    reviewer: reviewer,
                    score: score,
                    score_description: getScoreDescription(score),
                    reviewer_comments: comment
                };

                if (reviewData.source_filename) {
                    requestBody.source_filename = reviewData.source_filename;
                }

                const response = await fetch(`${API_BASE_URL}/reviews/score`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Failed to submit score');
                }

                const result = await response.json();
                
                successMsg.textContent = `✅ Score submitted successfully! Score: ${result.score}`;
                successMsg.style.display = 'block';
                errorEl.style.display = 'none';

                scoreInput.value = '';
                commentInput.value = '';
                hideScoringForm(reviewId);

                setTimeout(() => {
                    loadAllReviews();
                }, 1500);

            } catch (error) {
                errorEl.textContent = `Error: ${error.message}`;
                errorEl.style.display = 'block';
            }
        }

        function findReviewById(reviewId) {
            // This is a simplified version - in real implementation you'd need to store the reviews
            return window.currentReviews?.find(r => r.id === reviewId);
        }

        function getScoreClass(score) {
            if (score >= 9) return 'score-excellent';
            if (score >= 7) return 'score-good';
            if (score >= 5) return 'score-average';
            return 'score-poor';
        }

        function getScoreDescription(score) {
            if (score >= 9) return 'Excellent';
            if (score >= 7) return 'Good';
            if (score >= 5) return 'Average';
            if (score >= 3) return 'Below Average';
            return 'Poor';
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load reviews on page load
        window.addEventListener('DOMContentLoaded', loadAllReviews);
    </script>
</body>
</html>
