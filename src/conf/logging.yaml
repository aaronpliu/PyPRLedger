version: 1
disable_existing_loggers: false

formatters:
  default:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  detailed:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s - [%(filename)s:%(lineno)d]'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    formatter: default
    level: DEBUG
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.TimedRotatingFileHandler
    formatter: detailed
    level: INFO
    filename: logs/app.log
    when: D
    interval: 1
    backupCount: 30
    encoding: utf8
    
  error_file:
    class: logging.handlers.TimedRotatingFileHandler
    formatter: detailed
    level: ERROR
    filename: logs/error.log
    when: D
    interval: 1
    backupCount: 30
    encoding: utf8

loggers:
  uvicorn:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false
  
  uvicorn.error:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false
  
  uvicorn.access:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  sqlalchemy:
    level: WARNING
    handlers: [console, file, error_file]
    propagate: false

root:
  level: DEBUG
  handlers: [console, file, error_file]
